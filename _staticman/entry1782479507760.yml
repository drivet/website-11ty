message: "Драфт сюрвей (https://eurogal-surveys.ru/) — это процедура расчёта погружения корпуса для вычисления массы находящегося на борту товара. \r\nУпомянутый метод опирается на физический закон вытеснения и служит для расчёта количества груза по разности водоизмещения. \r\nОперация проводится перед и после загрузки или выгрузки, чтобы установить фактическое вес транспортируемого товара. \r\nСам процесс подразумевает снятия показаний осадки в нескольких местах и проведения корректировок на удельный вес жидкости. \r\nЭта методика повсеместно используется в морской торговле для коммерческих расчётов и проверок. \r\nДанная процедура считается надёжным способом проверки массы груза, признанным глобальными соглашениями."
