message: "Лекарство Оземпик представляет собой инновационным медикаментом для терапии диабета 2 типа. \r\nУказанный медикамент применяется путём инъекций раз в 7 дней благодаря эргономичной ручки-дозатора. \r\nЦентральное воздействие лекарства — стимулировать рецепторы ГПП-1, что приводит снижение глюкозы в плазме. \r\n<a href=\"https://tirz.pro/\">tirzepatide online</a> \r\nПомимо регуляции сахара, препарат способствует умеренному избавлению от лишних килограммов. \r\nКурс данного лекарства должен назначаться только врачом с учётом ограничений и рисков. \r\nВо время терапии возможны нежелательные эффекты, например тошнота или диарея, которые часто исчезают со второй-третьей неделей."
