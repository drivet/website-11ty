message: "Ударно-волновая терапия представляет собой современный способ воздействия, основанный на использовании звуковых импульсов. \r\nЭта техника стимулирует кровообращение и запускает процессы восстановления тканей. \r\nУВТ часто используется для терапии заболеваний опорно-двигательного аппарата – например, при тендинитах и пяточной шпоре. \r\nhttps://novogireevo-klinika.ru/ \r\nКлючевые плюсы метода – это неинвазивность, относительная терпимость и хорошая эффективность уже после нескольких процедур. \r\nКак правило сеанс длится около четверть часа и проводится в поликлинике без необходимости госпитализации. \r\nВ итоге пациенты отмечают заметное уменьшение болевого синдрома и восстановление свободы подвижности в поражённой зоне."
