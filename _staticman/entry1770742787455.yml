message: "Офсетная печать — самый популярный способ тиражной печати. \r\nШирокоформатная печать отлично подходит для небольших заказов и индивидуализации. \r\nШелкография активно применяется для нанесения на текстиль и плоские поверхности. \r\nhttps://www.wikidot.com/user:info/printinghouse4z \r\nФлексопечать используется в основном для гибкой упаковки и печати этикеток. \r\nПри наружной рекламы обычно заказывают широкоформатную печать на баннерах. \r\nОтделочная доводка включает такие операции, как биговка, высечка и фальцовка."
